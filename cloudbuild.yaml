# Cloud Build config for building and pushing llm_guard_api without Docker layer cache.

substitutions:
  _IMAGE: europe-west3-docker.pkg.dev/llm-guard-489015/llm-guard/llm-guard-api:latest

steps:
  - name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --no-cache
      - -f
      - llm_guard_api/Dockerfile
      - -t
      - ${_IMAGE}
      - llm_guard_api

images:
  - ${_IMAGE}

options:
  logging: CLOUD_LOGGING_ONLY
