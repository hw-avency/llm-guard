# Cloud Build config for building and pushing llm_guard_api with Docker layer cache.

steps:
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker pull europe-west3-docker.pkg.dev/llm-guard-489015/llm-guard/llm-guard-api:latest || true

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --cache-from
      - europe-west3-docker.pkg.dev/llm-guard-489015/llm-guard/llm-guard-api:latest
      - -f
      - llm_guard_api/Dockerfile
      - -t
      - europe-west3-docker.pkg.dev/llm-guard-489015/llm-guard/llm-guard-api:latest
      - llm_guard_api

images:
  - europe-west3-docker.pkg.dev/llm-guard-489015/llm-guard/llm-guard-api:latest

options:
  logging: CLOUD_LOGGING_ONLY

  
